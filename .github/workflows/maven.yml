name: Java CI with Maven

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Pull and Run SQL Server
      run: |
        IMAGE="mcr.microsoft.com/mssql/server:2022-latest"
        for i in {1..5}; do
          echo "Attempting to pull $IMAGE (Attempt $i)..."
          docker pull $IMAGE && break || {
            if [ $i -lt 5 ]; then
              WAIT=$((i * 30))
              echo "Pull failed with MCR block. Retrying in ${WAIT}s..."
              sleep $WAIT
            else
              echo "Failed to pull image after 5 attempts."
              exit 1
            fi
          }
        done
        docker run -e "ACCEPT_EULA=Y" -e "MSSQL_SA_PASSWORD=Password123!" -e "MSSQL_PID=Developer" -p 1433:1433 -d --name sqlserver $IMAGE
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Wait for SQL Server to start
      run: |
        sudo apt-get update
        sudo apt-get install -y mssql-tools18 unixodbc-dev
        # Intentar conectar hasta que esté listo
        until /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -Q "SELECT 1" > /dev/null 2>&1; do
          echo "Esperando a SQL Server..."
          sleep 5
        done

    - name: Initialize Database
      run: |
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -Q "CREATE DATABASE meditrack_db;"
        /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password123!" -C -d meditrack_db -i database/init.sql

    - name: Build with Maven
      run: mvn -B package -DskipTests --file pom.xml
      
    - name: Run Tests
      run: mvn test
      env:
        DB_HOST: localhost
        DB_PORT: 1433
        DB_NAME: meditrack_db
        DB_USER: sa
        DB_PASSWORD: Password123!
        DB_TRUST_SERVER_CERTIFICATE: true
